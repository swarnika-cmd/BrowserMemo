version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: smarana_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smarana_v2}
      POSTGRES_USER: ${POSTGRES_USER:-smarana_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smarana_secure_pass_2026}
    ports:
      - "${DB_PORT:-54321}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-smarana_user} -d $${POSTGRES_DB:-smarana_v2}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: smarana_web
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-smarana_user}:${POSTGRES_PASSWORD:-smarana_secure_pass_2026}@db:5432/${POSTGRES_DB:-smarana_v2}
      - JWT_SECRET=${JWT_SECRET:-5bf891ef60d5b060ee4515579f12d8a0c4f8d95eb079c6d3bc8f504de0f9b634}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

  web-prod:
    build: .
    container_name: smarana_web_prod
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-smarana_user}:${POSTGRES_PASSWORD:-smarana_secure_pass_2026}@db:5432/${POSTGRES_DB:-smarana_v2}
      - JWT_SECRET=${JWT_SECRET:-}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      - CORS_ORIGINS=${CORS_ORIGINS:-}
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - prod

volumes:
  pgdata:

