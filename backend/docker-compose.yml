version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: smarana_db
    environment:
      POSTGRES_DB: smarana_v2
      POSTGRES_USER: smarana_user
      POSTGRES_PASSWORD: smarana_secure_pass_2026
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smarana_user -d smarana_v2"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: smarana_web
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://smarana_user:smarana_secure_pass_2026@db:5432/smarana_v2
      - JWT_SECRET=5bf891ef60d5b060ee4515579f12d8a0c4f8d95eb079c6d3bc8f504de0f9b634
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  pgdata:
